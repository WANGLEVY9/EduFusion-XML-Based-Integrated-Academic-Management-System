services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: edufusion-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "EduFusion123!"
      MSSQL_PID: Developer
    ports:
      - "1433:1433"
    volumes:
      - ./sqlserver/init.sql:/init.sql
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "EduFusion123!" -C -Q "SELECT 1"
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  sqlserver-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: edufusion-sqlserver-init
    depends_on:
      sqlserver:
        condition: service_healthy
    volumes:
      - ./sqlserver/init.sql:/init.sql
    entrypoint: /bin/bash
    command: ["-c", "/opt/mssql-tools18/bin/sqlcmd -S sqlserver -U sa -P 'EduFusion123!' -C -d master -i /init.sql && echo 'SQL Server initialized successfully'"]

  oracle:
    image: gvenzl/oracle-xe:21-slim
    container_name: edufusion-oracle
    environment:
      ORACLE_PASSWORD: "EduFusion123"
      ORACLE_DATABASE: "EDUFUSION_B"
      APP_USER: "edufusion_b"
      APP_USER_PASSWORD: "EduFusion123"
    ports:
      - "1521:1521"
      - "5500:5500"
    volumes:
      - ./oracle/init.sql:/docker-entrypoint-initdb.d/init.sql
      - oracle-data:/opt/oracle/oradata
    healthcheck:
      test: healthcheck.sh
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 120s

  mysql:
    image: mysql:8.0
    container_name: edufusion-mysql
    environment:
      MYSQL_ROOT_PASSWORD: "123456"
      MYSQL_DATABASE: "edufusion_iams"
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    ports:
      - "3307:3306"
    volumes:
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p123456"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  sqlserver-data:
  oracle-data:
  mysql-data:
